<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VideoStream Hub - Xem Video</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  <style>
    * { font-family: 'Inter', sans-serif; }
    body { background: linear-gradient(135deg, #f8fafc 0%, #eef2f6 100%); }
    .embed-responsive { position: relative; overflow: hidden; padding-top: 56.25%; }
    .embed-responsive iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; border-radius: 12px; }
    .card-hover { transition: transform 0.2s ease, box-shadow 0.2s ease; }
    .card-hover:hover { transform: translateY(-4px); box-shadow: 0 20px 25px -12px rgba(0, 0, 0, 0.15); }
  </style>
</head>
<body class="antialiased">

<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 md:py-12">
  <div class="text-center mb-10">
    <div class="inline-flex items-center gap-3 bg-white/70 backdrop-blur-sm rounded-full px-5 py-2 shadow-sm mb-4">
      <i class="fab fa-facebook text-blue-600 text-xl"></i>
      <i class="fab fa-google-drive text-green-600 text-xl"></i>
      <i class="fas fa-play-circle text-purple-600 text-xl"></i>
    </div>
    <h1 class="text-4xl md:text-5xl font-extrabold bg-gradient-to-r from-slate-800 to-slate-600 bg-clip-text text-transparent">VideoStream Hub</h1>
    <p class="text-gray-500 mt-3 max-w-2xl mx-auto">Tổng hợp video hay từ Facebook, Google Drive và nhiều nền tảng khác</p>
  </div>

  <div id="videoGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>

  <div id="emptyLibraryMsg" class="text-center py-16 bg-white/40 rounded-2xl border border-dashed border-gray-300 mt-8 hidden">
    <i class="fas fa-video-slash text-5xl text-gray-400 mb-3"></i>
    <p class="text-gray-500">Chưa có video nào. Quản trị viên đang cập nhật!</p>
  </div>
</div>

<!-- Modal -->
<div id="videoModal" class="fixed inset-0 bg-black/70 backdrop-blur-sm flex items-center justify-center z-50 opacity-0 invisible transition-all p-4">
  <div class="bg-white rounded-2xl max-w-4xl w-full max-h-[90vh] overflow-y-auto">
    <div class="sticky top-0 bg-white border-b px-6 py-4 flex justify-between items-center">
      <h3 id="modalTitle" class="text-xl font-bold truncate">Video player</h3>
      <button id="closeModalBtn" class="text-gray-400 hover:text-gray-700 text-2xl">&times;</button>
    </div>
    <div class="p-5 md:p-6">
      <div id="modalEmbedContainer" class="embed-responsive rounded-xl overflow-hidden bg-black"></div>
      <div id="modalFallbackMsg" class="mt-4 text-amber-700 bg-amber-50 p-3 rounded-xl text-sm hidden"></div>
      <div class="mt-4 flex justify-between items-center">
        <a id="modalDirectLink" href="#" target="_blank" class="text-indigo-600 text-sm underline"><i class="fas fa-external-link-alt"></i> Mở link gốc</a>
        <span id="modalPlatform" class="text-xs text-gray-400"></span>
      </div>
    </div>
  </div>
</div>

<script>
// ========== CẤU HÌNH FIREBASE - THAY BẰNG CỦA BẠN ==========
const firebaseConfig = {
  apiKey: "AIzaSyABC123...",  // 👈 THAY BẰNG CỦA BẠN
  authDomain: "your-project.firebaseapp.com",
  projectId: "your-project",
  storageBucket: "your-project.firebasestorage.app",
  messagingSenderId: "123456789",
  appId: "1:123456789:web:abc123..."
};

// Khởi tạo Firebase
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// ========== XỬ LÝ VIDEO ==========
function parseVideoEmbedInfo(url) {
  if (!url) return { type: "invalid", embedUrl: null, platform: "Không xác định" };
  
  if (url.includes('facebook.com') || url.includes('fb.watch')) {
    return { type: "facebook", embedUrl: `https://www.facebook.com/plugins/video.php?href=${encodeURIComponent(url)}&show_text=0`, platform: "Facebook" };
  }
  
  const driveMatch = url.match(/drive\.google\.com\/file\/d\/([a-zA-Z0-9_-]+)/);
  if (driveMatch) {
    return { type: "googledrive", embedUrl: `https://drive.google.com/file/d/${driveMatch[1]}/preview`, platform: "Google Drive" };
  }
  
  if (url.match(/\.(mp4|mov|webm|mkv)(\?.*)?$/i)) {
    return { type: "directmp4", embedUrl: url, platform: "Video trực tiếp" };
  }
  
  if (url.includes('res.cloudinary.com')) {
    return { type: "cloudinary", embedUrl: url, platform: "Cloudinary" };
  }
  
  return { type: "generic", embedUrl: null, platform: "Link ngoài" };
}

// Lấy danh sách video từ Firebase
async function loadVideos() {
  const snapshot = await db.collection("videos").orderBy("createdAt", "desc").get();
  const videos = [];
  snapshot.forEach(doc => {
    videos.push({ id: doc.id, ...doc.data() });
  });
  renderVideoGrid(videos);
}

// Hiển thị danh sách video
function renderVideoGrid(videos) {
  const grid = document.getElementById("videoGrid");
  const emptyMsg = document.getElementById("emptyLibraryMsg");
  
  if (videos.length === 0) { 
    grid.innerHTML = ""; 
    emptyMsg.classList.remove("hidden"); 
    return; 
  }
  emptyMsg.classList.add("hidden");
  
  grid.innerHTML = videos.map(v => {
    let thumb = v.thumbnail || "https://placehold.co/600x400/334155/white?text=Video";
    const shortDesc = (v.description || "").length > 100 ? (v.description || "").slice(0,100)+"..." : (v.description || "Không có mô tả");
    const platformIcon = v.platform === "Facebook" ? "fab fa-facebook text-blue-500" : 
                         (v.platform === "Google Drive" ? "fab fa-google-drive text-green-500" : "fas fa-link text-gray-500");
    
    return `
      <div class="bg-white rounded-xl overflow-hidden shadow-md card-hover border border-gray-100">
        <div class="relative h-48 bg-gray-200 cursor-pointer" onclick='openModal(${JSON.stringify(v).replace(/'/g, "&apos;")})'>
          <img src="${thumb}" class="w-full h-full object-cover" onerror="this.src='https://placehold.co/600x400/334155/white?text=Video'">
          <div class="absolute inset-0 bg-black/30 flex items-center justify-center opacity-0 hover:opacity-100 transition">
            <i class="fas fa-play-circle text-white text-5xl"></i>
          </div>
          <div class="absolute top-2 right-2 bg-black/70 rounded-full px-2 py-1 text-xs text-white">
            <i class="${platformIcon} mr-1"></i> ${v.platform || 'Link'}
          </div>
        </div>
        <div class="p-4">
          <h3 class="font-bold text-lg line-clamp-1" title="${escapeHtml(v.title)}">${escapeHtml(v.title)}</h3>
          <p class="text-gray-500 text-sm mt-1 line-clamp-2">${escapeHtml(shortDesc)}</p>
          <div class="mt-3">
            <a href="${v.originalUrl}" target="_blank" class="text-indigo-500 text-sm hover:underline"><i class="fas fa-link"></i> Link gốc: ${v.platform || 'Nguồn'}</a>
          </div>
        </div>
      </div>
    `;
  }).join("");
}

// Modal
const modal = document.getElementById("videoModal");
const modalTitle = document.getElementById("modalTitle");
const modalContainer = document.getElementById("modalEmbedContainer");
const modalLink = document.getElementById("modalDirectLink");
const modalPlatform = document.getElementById("modalPlatform");
const modalFallbackMsg = document.getElementById("modalFallbackMsg");

function openModal(video) {
  modalTitle.innerText = video.title;
  modalContainer.innerHTML = "";
  modalFallbackMsg.classList.add("hidden");
  modalPlatform.innerText = video.platform || "Nguồn: " + (video.originalUrl?.split('/')[2] || "Link");
  
  const embed = parseVideoEmbedInfo(video.originalUrl);
  
  if (embed.embedUrl) {
    if (embed.type === "directmp4" || embed.type === "cloudinary") {
      modalContainer.innerHTML = `<video controls autoplay width="100%" style="max-height:70vh"><source src="${embed.embedUrl}" type="video/mp4"></video>`;
    } else {
      modalContainer.innerHTML = `<iframe src="${embed.embedUrl}" width="100%" height="100%" frameborder="0" allowfullscreen></iframe>`;
    }
    if (embed.type === "facebook") {
      modalFallbackMsg.innerHTML = `<i class="fas fa-info-circle"></i> Video Facebook có thể bị giới hạn nhúng. Dùng link gốc nếu không xem được.`;
      modalFallbackMsg.classList.remove("hidden");
    }
  } else {
    modalContainer.innerHTML = `<div class="p-8 text-center"><i class="fas fa-external-link-alt text-4xl text-gray-400 mb-3"></i><p class="text-gray-600">Video từ ${video.platform || "nền tảng này"} không hỗ trợ nhúng trực tiếp</p><p class="text-sm text-gray-400 mt-2">Nhấn nút bên dưới để mở link gốc</p></div>`;
  }
  modalLink.href = video.originalUrl;
  modal.classList.remove("opacity-0", "invisible");
  modal.classList.add("opacity-100", "visible");
  document.body.style.overflow = "hidden";
}

function closeModal() {
  modal.classList.add("opacity-0", "invisible");
  modal.classList.remove("opacity-100", "visible");
  document.body.style.overflow = "";
}

function escapeHtml(str) { 
  if(!str) return "";
  return str.replace(/[&<>]/g, function(m){ 
    return {'&':'&amp;','<':'&lt;','>':'&gt;'}[m]; 
  }); 
}

// Khởi tạo
window.addEventListener("DOMContentLoaded", () => {
  loadVideos();
  document.getElementById("closeModalBtn").onclick = closeModal;
  modal.onclick = (e) => { if(e.target === modal) closeModal(); };
});
</script>
</body>
</html>
